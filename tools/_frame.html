<!doctype html><meta charset="utf-8">
<title>frame</title>
<style>html,body{margin:0;padding:0;background:#fff}iframe{border:0;display:block}</style>
<iframe id="f" src=""></iframe>
<script>
  var p = new URLSearchParams(location.search);
  var f = document.getElementById('f');
  f.width = p.get('w') || 390; f.height = p.get('h') || 844;
  f.src = p.get('src') || '../_shot.html';
  // the inner page cannot be reached by --dump-dom, so it posts its
  // diagnostics out and we republish them in the top document
  window.addEventListener('message', function (e) {
    if (!e.data || e.data.__diag === undefined) return;
    var d = document.createElement('pre');
    d.id = '__diag'; d.style.display = 'none';
    d.textContent = e.data.__diag;
    document.body.appendChild(d);
  });
</script>
